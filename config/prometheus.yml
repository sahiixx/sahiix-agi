global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # SAHIIX-AGI built-in metrics endpoint
  - job_name: "sahiix-agi"
    static_configs:
      - targets: ["172.22.205.111:7777"]
    metrics_path: "/metrics"
    scheme: "http"

  # SAHIIX-AGI web health
  - job_name: "sahiix-web"
    static_configs:
      - targets: ["172.22.205.111:7777"]
    metrics_path: "/api/health"
    scheme: "http"

  # Ollama
  - job_name: "ollama"
    static_configs:
      - targets: ["172.22.205.111:11434"]

  # Agency agents
  - job_name: "agency-agents"
    static_configs:
      - targets: ["172.22.205.111:8766"]

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["172.22.205.111:6379"]

  # Qdrant
  - job_name: "qdrant"
    static_configs:
      - targets: ["172.22.205.111:6333"]
