# Nginx reverse proxy configuration for SAHIIX ecosystem
# Place this file in /etc/nginx/sites-available/sahiix and symlink to sites-enabled

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=intelligence_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream definitions
upstream sahiix_agi {
    server 127.0.0.1:7777;
    keepalive 64;
}

upstream sahiix_intelligence {
    server 127.0.0.1:8082;
    keepalive 64;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Dashboard static files
    location /dashboard {
        alias /home/sahiix/sahiixx_os/dashboard/dist;
        try_files $uri $uri/ /dashboard/index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Intelligence API — direct route with higher rate limit
    location /api/intelligence/ {
        proxy_pass http://sahiix_intelligence/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        limit_req zone=intelligence_limit burst=200 nodelay;
        limit_conn conn_limit 50;
    }

    # Prometheus metrics endpoint
    location /metrics {
        proxy_pass http://sahiix_agi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # All other traffic → SAHIIX-AGI
    location / {
        proxy_pass http://sahiix_agi;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        limit_req zone=api_limit burst=100 nodelay;
        limit_conn conn_limit 30;
    }
}

