<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHIIX AGI - Voice Mode</title>
<style>
:root{--bg:#0a0a0f;--panel:#12121a;--accent:#00f0ff;--accent2:#ff00a0;--text:#e0e0e0;--muted:#888;--border:#1a1a2e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.jarvis-circle{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(0,240,255,.2),transparent 60%),radial-gradient(circle at 70% 70%,rgba(255,0,160,.2),transparent 60%);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;position:relative;animation:pulse 2s infinite}
.jarvis-circle.listening{border-color:var(--accent2);animation:pulse .5s infinite}
.jarvis-circle.speaking{border-color:#0f0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(0,240,255,.3)}50%{transform:scale(1.05);box-shadow:0 0 40px rgba(0,240,255,.5)}}
.inner-circle{width:120px;height:120px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:3rem}
.status{margin-top:30px;font-size:1.2rem;color:var(--muted);min-height:30px;text-align:center}
.command{margin-top:15px;font-size:1rem;color:var(--accent);min-height:24px;text-align:center;max-width:600px;padding:0 20px}
.response{margin-top:15px;font-size:.9rem;color:var(--text);min-height:24px;text-align:center;max-width:600px;padding:0 20px;line-height:1.5}
.controls{margin-top:40px;display:flex;gap:15px}
.btn{padding:12px 28px;border:1px solid var(--border);border-radius:10px;background:var(--panel);color:var(--text);cursor:pointer;font-size:.9rem;transition:.2s}
.btn:hover{border-color:var(--accent);background:rgba(0,240,255,.1)}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#000;border:none;font-weight:700}
.btn.primary:hover{opacity:.9}
.wake-words{margin-top:20px;font-size:.75rem;color:var(--muted)}
.vis-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1}
</style>
</head>
<body>
<canvas class="vis-container" id="vis"></canvas>
<div class="jarvis-circle" id="jarvis">
<div class="inner-circle">🎙️</div>
</div>
<div class="status" id="status">Click microphone to start voice mode</div>
<div class="command" id="command"></div>
<div class="response" id="response"></div>
<div class="controls">
<button class="btn primary" id="micBtn" onclick="toggleVoice()">🎤 Start Listening</button>
<button class="btn" onclick="window.location.href='/'">💬 Chat Mode</button>
</div>
<div class="wake-words">Wake words: "Hey SAHIIX" | "OK SAHIIX" | Commands: status, apply, search, code, research</div>

<script>
let recognition = null;
let isListening = false;
let synth = window.speechSynthesis;
let jarvis = document.getElementById('jarvis');
let statusEl = document.getElementById('status');
let commandEl = document.getElementById('command');
let responseEl = document.getElementById('response');
let micBtn = document.getElementById('micBtn');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    
    recognition.onstart = () => {
        isListening = true;
        jarvis.classList.add('listening');
        statusEl.textContent = 'Listening... Say "Hey SAHIIX"';
        micBtn.textContent = '⏹ Stop';
    };
    
    recognition.onend = () => {
        if (isListening) recognition.start();
    };
    
    recognition.onresult = async (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim();
        console.log('Heard:', transcript);
        
        const wakeWords = ['hey sahiix', 'ok sahiix', 'sahiix', 'sahix', 'sahix'];
        const lower = transcript.toLowerCase();
        const hasWake = wakeWords.some(w => lower.includes(w));
        
        if (hasWake || isListening) {
            commandEl.textContent = '> ' + transcript;
            statusEl.textContent = 'Processing...';
            jarvis.classList.remove('listening');
            jarvis.classList.add('speaking');
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: transcript, agent: null})
                });
                const data = await res.json();
                responseEl.textContent = data.response;
                speak(data.response);
            } catch(e) {
                responseEl.textContent = 'Error: ' + e.message;
            }
            
            setTimeout(() => {
                jarvis.classList.remove('speaking');
                jarvis.classList.add('listening');
                statusEl.textContent = 'Listening...';
            }, 2000);
        }
    };
    
    recognition.onerror = (e) => {
        console.error('Speech error:', e.error);
        statusEl.textContent = 'Error: ' + e.error;
    };
} else {
    statusEl.textContent = 'Web Speech API not supported in this browser';
    micBtn.disabled = true;
}

function toggleVoice() {
    if (!recognition) return;
    if (isListening) {
        isListening = false;
        recognition.stop();
        jarvis.classList.remove('listening');
        statusEl.textContent = 'Voice mode paused';
        micBtn.textContent = '🎤 Start Listening';
    } else {
        recognition.start();
    }
}

function speak(text) {
    if (!synth) return;
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 1.0;
    utter.lang = 'en-US';
    // Try to find a male voice
    const voices = synth.getVoices();
    const maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('Guy') || v.name.includes('David'));
    if (maleVoice) utter.voice = maleVoice;
    synth.speak(utter);
}

// Visualization
canvas = document.getElementById('vis');
ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
particles = [];
for(let i=0;i<50;i++) particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5});
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.dx;p.y+=p.dy;
        if(p.x<0||p.x>canvas.width)p.dx*=-1;
        if(p.y<0||p.y>canvas.height)p.dy*=-1;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(0,240,255,.3)';
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
