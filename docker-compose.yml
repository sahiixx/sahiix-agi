version: "3.8"

# SAHIIX-AGI v2.5 Infrastructure Compose
# Core: Redis (cache), Qdrant (vectors), Prometheus (metrics), Grafana (viz)
# Extended (start separately): Temporal (workflows), n8n (automations), Kafka (messaging)

services:
  redis:
    image: redis:7-alpine
    container_name: sahiix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - sahiix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sahiix-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - sahiix-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:6333/"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: sahiix-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - sahiix-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sahiix-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - sahiix-network
    depends_on:
      - prometheus

  n8n:
    image: n8nio/n8n:latest
    container_name: sahiix-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_WEBHOOK_TEST_URL=http://localhost:5678
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - sahiix-network
    restart: unless-stopped

networks:
  sahiix-network:
    driver: bridge

volumes:
  redis-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
  n8n-data:
